<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leather-Themed Journal Viewer</title>
    <style>
        body {
            background-color: #7a5d4f; /* Leather brown background */
            font-family: Arial, sans-serif;
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            margin: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page {
            background-color: white;
            width: 210mm; /* A4 width */
            height: 297mm; /* A4 height */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            margin: 20px;
            padding: 20px;
            position: relative;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #5a3d2f;
            color: white;
            cursor: pointer;
        }
        button:disabled {
            background-color: #8b6b50;
            cursor: not-allowed;
        }
        .progress-bar {
            width: 100%;
            background: #5a3d2f;
            height: 10px;
            position: absolute;
            bottom: 0;
            left: 0;
            transition: width 0.3s;
        }
        @media (max-width: 768px) {
            .page {
                width: 100%;
                height: auto;
                margin: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Leather-Themed Journal Viewer</h1>
        <div class="page" id="page-1">
            <div>Page 1 Content</div>
            <div class="navigation">
                <button onclick="prevPage(1)" disabled>Previous</button>
                <button onclick="nextPage(1)">Next</button>
            </div>
            <div class="progress-bar" style="width: 6.66%;"></div>
        </div>
        <script>
            let currentPage = 1;
            const totalPages = 15;
            const passwords = ['','secret1','','secret2','','secret3']; // Passwords for pages 5, 10, 15

            function nextPage(pageNum) {
                if (pageNum < totalPages) {
                    currentPage++;
                    updatePage();
                }
            }

            function prevPage(pageNum) {
                if (pageNum > 1) {
                    currentPage--;
                    updatePage();
                }
            }

            function updatePage() {
                const page = document.getElementById(`page-${currentPage}`);
                if (page) {
                    page.scrollIntoView({ behavior: 'smooth' });
                }
                document.querySelector('.progress-bar').style.width = (currentPage / totalPages * 100) + '%';
                document.querySelector('.navigation button:first-child').disabled = (currentPage === 1);
                document.querySelector('.navigation button:last-child').disabled = (currentPage === totalPages);
                if (passwords[currentPage - 1]) {
                    const password = prompt('Enter password for page ' + currentPage + ':');
                    if (password !== passwords[currentPage - 1]) {
                        alert('Incorrect password!');
                        currentPage--;
                        updatePage();
                    }
                }
            }
        </script>
    </div>
</body>
</html>
